<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>
</head>
<body>

<script>

// MIJENJAŠ SAMO OVO AKO SE IP PROMIJENI
const baseIP = "http://10.43.144.71";

// POPIS STROJEVA
const strojevi = {

1: "CAN/Apollo",
2: "Laser",
3: "CNC-Haas",
4: "Pakirka",
5: "Preša"

};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// pronađi naziv stroja
const stroj = strojevi[id];

if (stroj) {

window.location.href =
baseIP + "/" + stroj + "/";

}
else {

document.body.innerHTML =
"<h2>Greška: stroj ne postoji</h2>";

}

</script>

</body>
</html>
