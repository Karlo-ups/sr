<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirect</title>
</head>
<body>

<script>

// MIJENJAŠ SAMO OVO AKO SE IP PROMIJENI
const baseIP = "http://10.43.144.71";

// POPIS STROJEVA
const strojevi = {

101: "CAN/Apolo",
102: "CAN/Cantronic",
103: "CAN/Checkmat1",
104: "CAN/Checkmat2",
105: "CAN/Depaletizator",
106: "CAN/Lift",
107: "CAN/Modulpack",
108: "CAN/Omatalica",
109: "CAN/Pasterizator",
110: "CAN/Punjac",
111: "CAN/Transport",
112: "CAN/Variopack"

};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// pronađi naziv stroja
const stroj = strojevi[id];

if (stroj) {

window.location.href =
baseIP + "/" + stroj + "/";

}
else {

document.body.innerHTML =
"<h2>Greška: stroj ne postoji</h2>";

}

</script>

</body>
</html>
